<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 620" width="1120" height="620">
  <title>Deguffer icon candidates</title>

  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5EEAD4"/><stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FCD34D"/><stop offset="1" stop-color="#F43F5E"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#A78BFA"/><stop offset="1" stop-color="#DB2777"/>
    </linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#BEF264"/><stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="g5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#67E8F9"/><stop offset="1" stop-color="#4338CA"/>
    </linearGradient>
    <linearGradient id="g6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FDBA74"/><stop offset="1" stop-color="#C026D3"/>
    </linearGradient>
    <linearGradient id="g7" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7DD3FC"/><stop offset="1" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="g8" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FEF08A"/><stop offset="1" stop-color="#EA580C"/>
    </linearGradient>
    <linearGradient id="g9" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F0ABFC"/><stop offset="1" stop-color="#4F46E5"/>
    </linearGradient>
    <linearGradient id="g10" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6EE7B7"/><stop offset="1" stop-color="#0E7490"/>
    </linearGradient>

    <!-- Sheet furniture only; the icons themselves sit on transparency. -->
    <pattern id="checker" width="24" height="24" patternUnits="userSpaceOnUse">
      <rect width="24" height="24" fill="#1b1d23"/>
      <rect width="12" height="12" fill="#22252d"/>
      <rect x="12" y="12" width="12" height="12" fill="#22252d"/>
    </pattern>
  </defs>

  <rect width="1120" height="620" fill="url(#checker)"/>
  <text x="40" y="52" font-family="Segoe UI, sans-serif" font-size="24" font-weight="600" fill="#e8eaf0">Deguffer — icon candidates</text>
  <text x="40" y="78" font-family="Segoe UI, sans-serif" font-size="14" fill="#9aa1b1">Transparent background; gradient fills. Chequerboard is sheet furniture, not part of the artwork.</text>

  <!-- ================= Row 1 ================= -->

  <!-- 1. Broom + sparkle -->
  <g transform="translate(60,120)">
    <g stroke-linecap="round" stroke-linejoin="round">
      <path d="M104 8 L62 50" fill="none" stroke="url(#g1)" stroke-width="13"/>
      <path d="M50 38 L74 62 L64 72 L40 48 Z" fill="url(#g1)"/>
      <path d="M64 72 L40 48 L14 96 a10 10 0 0 0 4 13 l30 17 a10 10 0 0 0 13 -4 Z" fill="url(#g1)"/>
      <path d="M31 71 L55 88 M22 86 L46 103" fill="none" stroke="#12141a" stroke-width="6" opacity="0.4"/>
      <path d="M98 68 V92 M86 80 H110" fill="none" stroke="url(#g1)" stroke-width="9" stroke-linecap="round"/>
    </g>
    <text x="64" y="150" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" fill="#9aa1b1">1 · Broom</text>
  </g>

  <!-- 2. Disk platter with sweep -->
  <g transform="translate(272,120)">
    <g fill="none" stroke-linecap="round">
      <circle cx="76" cy="64" r="40" stroke="url(#g2)" stroke-width="13"/>
      <circle cx="76" cy="64" r="10" fill="url(#g2)" stroke="none"/>
      <path d="M76 34 a30 30 0 0 1 26 15" stroke="url(#g2)" stroke-width="9" opacity="0.55"/>
      <path d="M4 44 H30 M0 64 H22 M4 84 H30" stroke="url(#g2)" stroke-width="9"/>
    </g>
    <text x="64" y="150" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" fill="#9aa1b1">2 · Platter sweep</text>
  </g>

  <!-- 3. Folder shedding weight -->
  <g transform="translate(484,120)">
    <g fill="none" stroke="url(#g3)" stroke-linecap="round" stroke-linejoin="round" stroke-width="12">
      <path d="M20 100 V38 a8 8 0 0 1 8-8 h22 l12 14 h34 a8 8 0 0 1 8 8 v48 a8 8 0 0 1 -8 8 H28 a8 8 0 0 1 -8-8 z" fill="url(#g3)" fill-opacity="0.18"/>
      <path d="M64 54 V88" stroke-width="12"/>
      <path d="M48 74 L64 90 L80 74" stroke-width="12"/>
    </g>
    <text x="64" y="150" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" fill="#9aa1b1">3 · Folder purge</text>
  </g>

  <!-- 4. Magnet gathering debris -->
  <g transform="translate(696,120)">
    <g fill="none" stroke-linecap="butt">
      <path d="M27 96 V62 a37 37 0 0 1 74 0 v34" stroke="url(#g4)" stroke-width="18"/>
      <path d="M27 100 V88 M101 100 V88" stroke="url(#g4)" stroke-width="18"/>
      <path d="M27 100 V78 M101 100 V78" stroke="#12141a" stroke-width="18" opacity="0.75"/>
      <path d="M18 34 L30 22 M64 22 V6 M110 34 L98 22" stroke="url(#g4)" stroke-width="9" stroke-linecap="round"/>
    </g>
    <text x="64" y="150" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" fill="#9aa1b1">4 · Magnet</text>
  </g>

  <!-- 5. Sieve / funnel -->
  <g transform="translate(908,120)">
    <g stroke-linecap="round" stroke-linejoin="round">
      <path d="M16 24 H112 L74 70 V108 L54 94 V70 Z" fill="url(#g5)" fill-opacity="0.22" stroke="url(#g5)" stroke-width="12" fill-rule="evenodd"/>
      <g fill="url(#g5)">
        <rect x="30" y="0" width="14" height="14" rx="4"/>
        <rect x="58" y="-6" width="14" height="14" rx="4"/>
        <rect x="86" y="2" width="14" height="14" rx="4"/>
      </g>
    </g>
    <text x="64" y="150" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" fill="#9aa1b1">5 · Sieve</text>
  </g>

  <!-- ================= Row 2 ================= -->

  <!-- 6. D monogram with sweep tail -->
  <g transform="translate(60,360)">
    <g fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M38 20 H68 a44 44 0 0 1 0 88 H38 Z" fill="url(#g6)" fill-opacity="0.2" stroke="url(#g6)" stroke-width="13"/>
      <path d="M4 44 H30 M12 64 H30 M4 84 H30" stroke="url(#g6)" stroke-width="9"/>
    </g>
    <text x="64" y="150" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" fill="#9aa1b1">6 · D monogram</text>
  </g>

  <!-- 7. Drive ejecting -->
  <g transform="translate(272,360)">
    <g fill="none" stroke="url(#g7)" stroke-linecap="round" stroke-linejoin="round">
      <rect x="18" y="62" width="92" height="48" rx="12" fill="url(#g7)" fill-opacity="0.2" stroke-width="12"/>
      <circle cx="90" cy="86" r="6" fill="url(#g7)" stroke="none"/>
      <path d="M64 44 V6" stroke-width="12"/>
      <path d="M44 26 L64 6 L84 26" stroke-width="12"/>
    </g>
    <text x="64" y="150" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" fill="#9aa1b1">7 · Reclaim</text>
  </g>

  <!-- 8. Sparkle trio -->
  <g transform="translate(484,360)">
    <g fill="url(#g8)">
      <path d="M58 6 C62 34 70 42 98 46 C70 50 62 58 58 86 C54 58 46 50 18 46 C46 42 54 34 58 6 Z"/>
      <path d="M96 62 C98 78 102 82 118 84 C102 86 98 90 96 106 C94 90 90 86 74 84 C90 82 94 78 96 62 Z"/>
      <path d="M28 78 C29 90 32 93 44 94 C32 95 29 98 28 110 C27 98 24 95 12 94 C24 93 27 90 28 78 Z"/>
    </g>
    <text x="64" y="150" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" fill="#9aa1b1">8 · Sparkle</text>
  </g>

  <!-- 9. Stack dissolving -->
  <g transform="translate(696,360)">
    <g fill="url(#g9)">
      <rect x="12" y="92" width="104" height="20" rx="7"/>
      <rect x="24" y="62" width="80" height="20" rx="7" opacity="0.78"/>
      <rect x="40" y="32" width="48" height="20" rx="7" opacity="0.5"/>
      <circle cx="40" cy="14" r="9" opacity="0.4"/>
      <circle cx="70" cy="8" r="7" opacity="0.28"/>
      <circle cx="94" cy="18" r="5" opacity="0.18"/>
    </g>
    <text x="64" y="150" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" fill="#9aa1b1">9 · Shrinking stack</text>
  </g>

  <!-- 10. Vortex pulling blocks -->
  <g transform="translate(908,360)">
    <g fill="none" stroke="url(#g10)" stroke-linecap="round">
      <path d="M40 26 a44 44 0 1 1 -14 26" stroke-width="14"/>
      <path d="M52 96 a26 26 0 1 0 -24 -16" stroke-width="12" opacity="0.6"/>
      <g fill="url(#g10)" stroke="none">
        <rect x="6" y="4" width="20" height="20" rx="6" transform="rotate(-20 16 14)"/>
        <rect x="36" y="-8" width="14" height="14" rx="5" opacity="0.6" transform="rotate(16 43 -1)"/>
      </g>
    </g>
    <text x="64" y="150" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" fill="#9aa1b1">10 · Vortex</text>
  </g>
</svg>
