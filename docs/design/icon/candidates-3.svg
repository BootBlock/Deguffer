<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 640" width="1120" height="640">
  <title>Deguffer icon candidates — stack variations</title>

  <defs>
    <!--
      Stops, positions and direction taken from New-RainbowBrush in SpectraWrite's
      generate-spectrawrite-icon.ps1, so a Deguffer mark sits in the same set.
      userSpaceOnUse means each icon spans the gradient across its own 128-unit cell,
      matching the script's PointF(0,0) -> PointF(Size,Size) diagonal.
    -->
    <linearGradient id="rainbow" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="128" y2="128">
      <stop offset="0.00" stop-color="#FF0000"/>
      <stop offset="0.14" stop-color="#FF8C00"/>
      <stop offset="0.28" stop-color="#FFD700"/>
      <stop offset="0.42" stop-color="#00C853"/>
      <stop offset="0.56" stop-color="#00BCD4"/>
      <stop offset="0.70" stop-color="#2196F3"/>
      <stop offset="0.84" stop-color="#9C27B0"/>
      <stop offset="1.00" stop-color="#FF0000"/>
    </linearGradient>

    <pattern id="checker3" width="24" height="24" patternUnits="userSpaceOnUse">
      <rect width="24" height="24" fill="#1b1d23"/>
      <rect width="12" height="12" fill="#22252d"/>
      <rect x="12" y="12" width="12" height="12" fill="#22252d"/>
    </pattern>

    <!-- Every candidate is an outline on this common weight and joinery. -->
    <style>
      .ol { fill: none; stroke: url(#rainbow); stroke-width: 7; stroke-linejoin: round; stroke-linecap: round; }
      .lbl { font-family: "Segoe UI", sans-serif; font-size: 13px; fill: #9aa1b1; text-anchor: middle; }
    </style>
  </defs>

  <rect width="1120" height="640" fill="url(#checker3)"/>
  <text x="40" y="52" font-family="Segoe UI, sans-serif" font-size="24" font-weight="600" fill="#e8eaf0">Deguffer — stack variations, outlined</text>
  <text x="40" y="78" font-family="Segoe UI, sans-serif" font-size="14" fill="#9aa1b1">SpectraWrite rainbow stops, diagonal top-left to bottom-right, 80% of canvas. Outline only, no fills.</text>

  <!-- ================= Row 1 ================= -->

  <!-- 21. Tapering stack -->
  <g transform="translate(60,120)">
    <g class="ol">
      <rect x="14" y="86" width="100" height="26" rx="7"/>
      <rect x="28" y="52" width="72" height="26" rx="7"/>
      <rect x="44" y="18" width="40" height="26" rx="7"/>
    </g>
    <text x="64" y="150" class="lbl">21 · Taper</text>
  </g>

  <!-- 22. Stack with the top box lifting clear -->
  <g transform="translate(272,120)">
    <g class="ol">
      <rect x="14" y="88" width="100" height="26" rx="7"/>
      <rect x="30" y="56" width="68" height="26" rx="7"/>
      <rect x="46" y="10" width="36" height="26" rx="7"/>
      <path d="M64 46 V40" stroke-dasharray="0.1 12"/>
    </g>
    <text x="64" y="150" class="lbl">22 · Lift-off</text>
  </g>

  <!-- 23. Nested squares closing in -->
  <g transform="translate(484,120)">
    <g class="ol">
      <rect x="10" y="10" width="108" height="108" rx="10"/>
      <rect x="30" y="30" width="68" height="68" rx="8"/>
      <rect x="50" y="50" width="28" height="28" rx="6"/>
    </g>
    <text x="64" y="150" class="lbl">23 · Nested</text>
  </g>

  <!-- 24. Cascade of shrinking squares -->
  <g transform="translate(696,120)">
    <g class="ol">
      <rect x="8" y="66" width="52" height="52" rx="8"/>
      <rect x="66" y="46" width="36" height="36" rx="7"/>
      <rect x="90" y="16" width="24" height="24" rx="6"/>
    </g>
    <text x="64" y="150" class="lbl">24 · Cascade</text>
  </g>

  <!-- 25. Bars shrinking, left-aligned -->
  <g transform="translate(908,120)">
    <g class="ol">
      <rect x="12" y="16" width="104" height="24" rx="7"/>
      <rect x="12" y="52" width="70" height="24" rx="7"/>
      <rect x="12" y="88" width="38" height="24" rx="7"/>
    </g>
    <text x="64" y="150" class="lbl">25 · Reducing</text>
  </g>

  <!-- ================= Row 2 ================= -->

  <!-- 26. Stack inside a container -->
  <g transform="translate(60,380)">
    <g class="ol">
      <rect x="8" y="8" width="112" height="112" rx="12"/>
      <rect x="26" y="82" width="76" height="20" rx="6"/>
      <rect x="38" y="54" width="52" height="20" rx="6"/>
      <rect x="50" y="26" width="28" height="20" rx="6"/>
    </g>
    <text x="64" y="150" class="lbl">26 · Contained</text>
  </g>

  <!-- 27. Stack with the top boxes breaking apart -->
  <g transform="translate(272,380)">
    <g class="ol">
      <rect x="10" y="88" width="108" height="26" rx="7"/>
      <rect x="26" y="54" width="76" height="26" rx="7"/>
      <rect x="30" y="16" width="24" height="24" rx="6"/>
      <rect x="66" y="10" width="18" height="18" rx="5"/>
      <rect x="94" y="20" width="13" height="13" rx="4"/>
    </g>
    <text x="64" y="150" class="lbl">27 · Breaking up</text>
  </g>

  <!-- 28. Stack pierced by a downward arrow -->
  <g transform="translate(484,380)">
    <g class="ol">
      <rect x="14" y="14" width="100" height="24" rx="7"/>
      <rect x="14" y="50" width="60" height="24" rx="7"/>
      <rect x="14" y="86" width="34" height="24" rx="7"/>
      <path d="M96 62 V108 M80 92 L96 108 L112 92"/>
    </g>
    <text x="64" y="150" class="lbl">28 · Reducing + arrow</text>
  </g>

  <!-- 29. Pyramid of decreasing boxes -->
  <g transform="translate(696,380)">
    <g class="ol">
      <rect x="10" y="86" width="108" height="26" rx="7"/>
      <rect x="24" y="52" width="46" height="26" rx="7"/>
      <rect x="78" y="52" width="30" height="26" rx="7"/>
      <rect x="24" y="18" width="26" height="26" rx="6"/>
    </g>
    <text x="64" y="150" class="lbl">29 · Mixed sizes</text>
  </g>

  <!-- 30. Two stacks, before and after -->
  <g transform="translate(908,380)">
    <g class="ol">
      <rect x="6" y="16" width="46" height="22" rx="6"/>
      <rect x="6" y="46" width="46" height="22" rx="6"/>
      <rect x="6" y="76" width="46" height="22" rx="6"/>
      <rect x="76" y="76" width="46" height="22" rx="6"/>
      <path d="M62 60 H70" stroke-dasharray="0.1 14"/>
    </g>
    <text x="64" y="150" class="lbl">30 · Before / after</text>
  </g>
</svg>
